# Monitors
# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = eDP-1, 1920x1080@60, 0x0, 1
monitor = HDMI-A-1, 1920x1080@60, 0x0, 1, mirror, eDP-1, bitdepth, 10

## Source other files (optional)
# source = ~/.config/hypr/myColors.conf

## Environment variables (grouped & deduplicated)
# Semantic groups make it easier to scan and maintain

# General / desktop
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = SDL_VIDEODRIVER,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# Graphics / video drivers
env = LIBVA_DRIVER_NAME,iHD
env = LIBVA_DRIVERS_PATH,/usr/lib/dri
env = MESA_LOADER_DRIVER_OVERRIDE,iris
env = VDPAU_DRIVER,va_gl
env = WLR_NO_HARDWARE_CURSORS,1

## Autostart / exec-once grouped
# User scripts and small daemons
exec-once = wl-paste --watch cliphist store &
exec-once = $HOME/.config/hypr/scripts/xdg-portal-hyprland.sh
exec-once = $HOME/.config/hypr/scripts/wallpaper_launcher.zsh
exec-once = /usr/bin/python3 $HOME/.config/hypr/scripts/caps_status.py
exec-once = wl-gammactl -c 1.050 -b 0.920 -g 1.00 &
exec-once = $HOME/scripts/hyprland-auto-animation.sh 15

# Small daemons and UI components
exec-once = swww-daemon &
exec-once = swaync & waybar
exec-once = hypridle
exec-once = nm-applet
exec-once = xwaylandvideobridge &

# System helpers
# exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = usr/lib/polkit-1/polkitd
# Start the keyring daemon, capture its env vars, then propagate everything to D-Bus/systemd
exec-once = eval $(gnome-keyring-daemon --start --components=pkcs11,secrets,ssh) && dbus-update-activation-environment --systemd --all
exec-once = systemctl --user start hyprpolkitagent
exec-once = xremap --watch=config ~/.config/xremap/config.yml

# Theme/settings (non-atomic; consider moving to a script if you want deterministic startup)
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Adwaita"
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"

input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =

  follow_mouse = 1

  touchpad {
    natural_scroll = no
    scroll_factor = 0.5
  }

  # sensitivity = 0.1 # -1.0 - 1.0, 0 means no modification.
  # force_no_accel=true
  accel_profile = custom 0.6218984766 0.000 0.307 0.615 1.077 1.539 2.002 2.505 3.208 3.910 4.613 5.315 6.018 6.720 7.423 8.125 8.828 9.530 10.233 10.935 12.387
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    # gaps_in = 0
    # gaps_out = 1
    gaps_in = 2
    gaps_out = 4
    border_size = 2

    col.active_border = rgba(5a5a5aff)
    col.inactive_border = rgba(1e1e1eff)

    layout = dwindle
}

group {
    col.border_active = rgba(5a5a5aff)
    col.border_inactive = rgba(1e1e1eff)
  groupbar {
    col.active = rgba(5a5a5aff)
    col.inactive = rgba(1e1e1eff)
  }
}


decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    # rounding = 0
    rounding = 5

    blur {
        enabled = false
        size = 5
        passes = 4
        vibrancy = 0.1
        vibrancy_darkness = 0.2
        new_optimizations = true
        # popups = true
        xray = true
        # noise =  0.1
        ignore_opacity = 1
    }

  shadow {
    enabled = false
  }

}

animations {
  enabled = yes

  # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

  bezier = myBezier, 0.05, 0.9, 0.1, 1.05

  animation = windows, 1, 2, myBezier
  animation = windowsOut, 1, 2, default, popin 80%
  animation = border, 1, 10, default
  animation = fade, 1, 4, default
  animation = workspaces, 1, 3, default
  animation = specialWorkspace, 1, 3, myBezier, slidevert
}

debug {
  disable_logs = true
}

misc {
  vfr = true
  animate_manual_resizes = true
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}



gesture = 3, horizontal, workspace
# gesture = 4, up, fullscreen
# gesture = 3, up, mod: SUPER, scale: 1.5, fullscreen


# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device {
    # name = epic-mouse-v1
    name = MSFT0001:01 04F3:31B8 Touchpad
    sensitivity = -0.5
}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

layerrule = dimaround, launcher
layerrule = blurpopups, launcher
layerrule = animation, slide, launcher

# xwaylandvideobridge settings
windowrulev2 = opacity 0.0 override, class:^(xwaylandvideobridge)$
windowrulev2 = noanim, class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus, class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1, class:^(xwaylandvideobridge)$
windowrulev2 = noblur, class:^(xwaylandvideobridge)$


windowrulev2 = float,class:^(Zoom)$
windowrulev2 = float,class:^(zoom)$
windowrulev2 = float,class:^(thunar)$
windowrulev2 = float,class:^(Lxappearance)$
windowrulev2 = float,title:^(rofi)(.*)$
windowrule = rounding 10,title:^(rofi)(.*)$

windowrulev2 = maximize,class:^(winbox.exe)$
windowrulev2 = float,class:^(org.telegram.desktop)$
windowrulev2 = float,title:^(ranger)$
windowrulev2 = size 60% 80%,class:^(org.telegram.desktop)$
windowrulev2 = size 60% 80%,title:^(Open Files|ranger)$
windowrulev2 = center,class:^(org.telegram.desktop|Open Files|ranger|Select Files|thunar)$
windowrulev2 = opacity 0.8 0.8,title:^(Open Files|ranger)$
windowrulev2 = noborder,fullscreen:1 
windowrulev2 = noanim, class:^(waybar)$
layerrule = blur,gtk-layer-shell

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = ALT_R

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive, 
bind = SUPER, Delete, exec, systemctl suspend
bind = $mainMod SHIFT, Q, exec, wlogout -p layer-shell bind = $mainMod, M, exit, 
bind = $mainMod, G, togglegroup, 
bind = $mainMod, W, exec, $HOME/scripts/fuzzel-hyprland-switcher-with-alias.sh
bind = $mainMod SHIFT, W, exec, $HOME/scripts/fuzzel-hyprland-switcher-alias-input.sh
bind = $mainMod SHIFT, R, exec, $HOME/scripts/fuzzel-hyprland-rename-current-window.sh
bind = $mainMod, space, togglespecialworkspace
bind = $mainMod SHIFT, space, movetoworkspace, special
bind = $mainMod SHIFT, X, movetoworkspace, 1
bind = $mainMod, backslash, exec, thunar
bind = $mainMod CTRL, R, exec, ~/.config/waybar/launch.sh
bind = $mainMod CTRL, W, exec, ~/.config/hypr/scripts/wallpaper_launcher.zsh
bind = $mainMod SHIFT, V, togglefloating, 
bind = $mainMod, D, exec, fuzzel
bind = $mainMod, E, exec, $HOME/scripts/fuzzel-file-explorer.sh
bind = $mainMod, S, togglesplit,
bind = SUPER SHIFT, L, exec, swaylock --grace 0 | sleep 2; systemctl suspend
bind = SUPER, L, exec, swaylock 
bind = $mainMod SHIFT, F, fullscreen
bind = $mainMod SHIFT,A, exec, $HOME/scripts/toggle-waybar.sh
bind = $mainMod, C, exec, hyprctl dispatch focuscurrentorlast
bind = $mainMod, N, exec, swaync-client -t -sw

# Move focus with vim like
bind = $mainMod, l, movefocus, l
bind = $mainMod, h, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move window
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u

# Move focused within a group
bind= $mainMod, u, changegroupactive, b
bind= $mainMod, i, changegroupactive, n

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

## Resize mode/submap
bind=$mainMod,R,submap,resize
submap=resize
    unbind = ,down
    binde = , l, resizeactive,  100 0
    binde = , h,  resizeactive, -100 0
    binde = , j,  resizeactive,  0 100
    binde = , k,    resizeactive,  0 -100
    binde = SHIFT, right, resizeactive,  10 0
    binde = SHIFT, left,  resizeactive, -10 0
    binde = SHIFT, down,  resizeactive,  0 10
    binde = SHIFT, up,    resizeactive,  0 -10
    bind = , escape,submap,reset 
    bind = , return,submap,reset 
    bind = , q,submap,reset 
submap=reset

bind=$mainMod,O,submap,open
submap=open

  bind = , b, exec, zen-browser &
  bind = , s, exec, sioyek &
  bind = , n, exec, kitty -e nvim
  bind = , o, exec, flatpak run md.obsidian.Obsidian
  bind = , c, exec, code
  bind = , a, exec, zen-browser --new-window 'https://chatgpt.com/?ref=dotcom&temporary-chat=true'

  bind = , b, submap, reset
  bind = , s, submap, reset
  bind = , n, submap, reset
  bind = , o, submap, reset
  bind = , c, submap, reset
  bind = , a, submap, reset

submap=reset

bind=$mainMod, M, submap, menu
submap=menu
  bind = , t, exec, $HOME/scripts/fuzzel-todo.sh
  bind = , k, exec, $HOME/scripts/fuzzel-pkill.sh
  bind = , p, exec, $HOME/scripts/fuzzel-powermenu.sh
  bind = , c, exec, $HOME/scripts/cliphist-fuzzel-img.sh

  bind = , catchall, submap, reset
  bind = , t, submap, reset
  bind = , k, submap, reset
  bind = , p, submap, reset
  bind = , c, submap, reset
  bind = , q, submap, reset

submap=reset

bind = $mainMod, P, exec, $HOME/scripts/toggle-special-hyprland.sh kitty note \
    "kitty --command='nvim -n /tmp/tmp.md -c \"vsplit ~/Documents/todo.md\"'"

# Minimize steam instead of killing
# if [ "$(hyprctl activewindow -j | jq -r ".class")" = "Steam" ]; then
#     xdotool getactivewindow windowunmap
# else
#     hyprctl dispatch killactive ""
# fi


binde =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
binde =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Screenshot
bind = $mainMod, P, exec, grim -t png "${HOME}/Pictures/Screenshots/Screenshot-`date +%F-%T`.png"
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
